<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تسجيل الدخول</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background: #f8f9fa; padding-top: 80px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow border-0 rounded-4 p-5">
        <h3 class="text-center fw-bold mb-4">تسجيل الدخول</h3>
        <form id="loginForm">
          <div class="mb-3">
            <label>البريد الإلكتروني</label>
            <input type="email" id="loginEmail" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>كلمة المرور</label>
            <input type="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 mb-3">دخول</button>
          <div class="text-center">
            <a href="register.html" class="text-decoration-none d-block mb-2">إنشاء حساب جديد</a>
            <a href="index.html" class="text-muted text-decoration-none">العودة للرئيسية</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value;
      const name = email.split('@')[0]; // استخدام أول جزء من الإيميل كاسم
      
      localStorage.setItem('currentUser', JSON.stringify({ name: name, email: email }));
      window.location.href = 'index.html';
  });
</script>
</body>
</html>
