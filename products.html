<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>متجري - قائمة المنتجات</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; }
    .product-card { transition: 0.3s; border: none; border-radius: 15px; overflow: hidden; }
    .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-bag-heart-fill"></i> متجري</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link active" href="products.html">المنتجات</a></li>
        </ul>
        <div id="authContainer" class="d-flex align-items-center gap-2">
            <a href="login.html" class="btn btn-outline-light btn-sm rounded-pill">دخول</a>
            <a href="register.html" class="btn btn-light btn-sm text-primary rounded-pill">حساب جديد</a>
            <a href="cart.html" class="btn btn-primary position-relative rounded-circle p-2 ms-2 border-light">
                <i class="bi bi-cart3"></i>
                <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
      </div>
    </div>
  </nav>

  <section class="py-4 bg-white border-bottom shadow-sm">
    <div class="container">
      <div class="row g-3">
        <div class="col-md-5">
          <input type="text" id="searchInput" class="form-control" placeholder="ابحث عن منتج بالاسم...">
        </div>
        <div class="col-md-4">
          <select id="priceFilter" class="form-select">
            <option value="all">جميع الأسعار</option>
            <option value="low">أقل من 50 دولار</option>
            <option value="mid">50 - 150 دولار</option>
            <option value="high">أكثر من 150 دولار</option>
          </select>
        </div>
        <div class="col-md-3">
          <button onclick="resetFilters()" class="btn btn-outline-secondary w-100">إعادة تعيين</button>
        </div>
      </div>
    </div>
  </section>

  <section class="py-5">
    <div class="container">
      <div id="productsGrid" class="row g-4"></div>
    </div>
  </section>

  <script>
    const products = [
      { id: 1, name: "ساعة ابل الذكية", price: 299, img: "https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400" },
      { id: 2, name: "سماعات سوني", price: 120, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
      { id: 3, name: "حذاء رياضي نايك", price: 85, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" },
      { id: 4, name: "نظارة شمسية", price: 40, img: "https://images.unsplash.com/photo-1511499767150-a48a237f0083?w=400" },
      { id: 5, name: "كاميرا احترافية", price: 550, img: "https://images.unsplash.com/photo-1516035069371-29a1b244cc32?w=400" },
      { id: 6, name: "حقيبة سفر", price: 110, img: "https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400" }
    ];

    const grid = document.getElementById('productsGrid');

    function displayProducts(items) {
      grid.innerHTML = items.map(p => `
        <div class="col-md-4 col-lg-3">
          <div class="card h-100 product-card shadow-sm">
            <img src="${p.img}" class="card-img-top" style="height:200px; object-fit:cover;">
            <div class="card-body text-center">
              <h5 class="card-title fw-bold">${p.name}</h5>
              <p class="text-primary fw-bold">${p.price} $</p>
              <button class="btn btn-primary w-100" onclick="addToCart('${p.name}', ${p.price}, '${p.img}')">أضف للسلة</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // الدالة المعدلة لحفظ المنتجات فعلياً في السلة
    function addToCart(name, price, img) {
        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        cart.push({ name: name, price: price, img: img });
        localStorage.setItem('cart', JSON.stringify(cart));
        
        // تحديث الرقم في الـ Navbar فوراً
        updateCartCount();
        alert(`تمت إضافة ${name} للسلة!`);
    }

    function filterProducts() {
      const text = document.getElementById('searchInput').value.toLowerCase();
      const priceRange = document.getElementById('priceFilter').value;
      const filtered = products.filter(p => {
        const matchesName = p.name.toLowerCase().includes(text);
        let matchesPrice = (priceRange === 'low') ? p.price < 50 : 
                           (priceRange === 'mid') ? (p.price >= 50 && p.price <= 150) :
                           (priceRange === 'high') ? p.price > 150 : true;
        return matchesName && matchesPrice;
      });
      displayProducts(filtered);
    }

    function resetFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('priceFilter').value = 'all';
        displayProducts(products);
    }

    document.getElementById('searchInput').addEventListener('input', filterProducts);
    document.getElementById('priceFilter').addEventListener('change', filterProducts);
    
    // تشغيل العرض عند التحميل
    displayProducts(products);
  </script>

  <script src="js/main.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
