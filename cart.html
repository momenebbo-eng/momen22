<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>عربة التسوق - مـتـجـري</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #f0f2f5; padding-bottom: 50px; }
    .cart-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border: none; }
    .checkout-form { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
    .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">🛍️ مـتـجـري</a>
      <a href="products.html" class="btn btn-light btn-sm rounded-pill px-3">متابعة التسوق</a>
    </div>
  </nav>

  <div class="container">
    <div class="row g-4">
      
      <div class="col-lg-7">
        <div class="cart-card">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h4 class="fw-bold m-0"><i class="bi bi-cart3 text-primary"></i> المنتجات المختارة</h4>
            <button class="btn btn-sm btn-outline-danger rounded-pill" onclick="clearCart()">مسح الكل</button>
          </div>
          
          <div id="cartItemsContainer">
            </div>

          <hr class="my-4">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="fw-bold">الإجمالي النهائي:</h5>
            <h4 class="fw-bold text-primary"><span id="totalPrice">0</span> $</h4>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="checkout-form">
          <h4 class="fw-bold mb-4">بيانات التوصيل</h4>
          <form id="checkoutForm">
            <div class="mb-3">
              <label class="form-label">الاسم بالكامل</label>
              <input type="text" id="custName" class="form-control" placeholder="اكتب اسمك الثلاثي" required>
            </div>
            <div class="mb-3">
              <label class="form-label">رقم الهاتف (واتساب)</label>
              <input type="tel" id="custPhone" class="form-control" placeholder="01xxxxxxxxx" required>
            </div>
            <div class="mb-3">
              <label class="form-label">عنوان التوصيل بالتفصيل</label>
              <textarea id="custAddress" class="form-control" rows="3" placeholder="المحافظة، المدينة، اسم الشارع، رقم المنزل" required></textarea>
            </div>
            
            <div class="alert alert-info small">
              <i class="bi bi-info-circle me-1"></i> سيتم إرسال تفاصيل طلبك فوراً إلى الإدارة للمراجعة.
            </div>

            <button type="submit" id="submitOrderBtn" class="btn btn-primary btn-lg w-100 rounded-pill shadow fw-bold">
              إتمام الشراء وإرسال الطلب
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script>
    // 1. جلب المنتجات من الذاكرة وعرضها
    function displayCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cartItemsContainer');
      const totalSpan = document.getElementById('totalPrice');
      
      if (cart.length === 0) {
        container.innerHTML = `
          <div class="text-center py-5">
            <i class="bi bi-cart-x display-1 text-muted"></i>
            <p class="mt-3 lead">سلتك فارغة حالياً</p>
          </div>`;
        totalSpan.innerText = "0";
        document.getElementById('submitOrderBtn').disabled = true;
        return;
      }

      let total = 0;
      let html = '<div class="list-group list-group-flush">';
      
      cart.forEach((item, index) => {
        total += item.price;
        html += `
          <div class="list-group-item d-flex align-items-center py-3 px-0">
            <img src="${item.img}" class="product-img me-3 border">
            <div class="flex-grow-1">
              <h6 class="mb-0 fw-bold">${item.name}</h6>
              <small class="text-muted">${item.price} $</small>
            </div>
            <button class="btn btn-sm text-danger" onclick="removeItem(${index})"><i class="bi bi-trash"></i></button>
          </div>`;
      });
      
      html += '</div>';
      container.innerHTML = html;
      totalSpan.innerText = total;
      document.getElementById('submitOrderBtn').disabled = false;
    }

    // 2. حذف منتج واحد
    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      displayCart();
    }

    // 3. مسح السلة بالكامل
    function clearCart() {
      if(confirm('هل تريد مسح جميع المنتجات من السلة؟')) {
        localStorage.removeItem('cart');
        displayCart();
      }
    }

    // 4. إرسال الطلب للسيرفر (الربط مع Backend)
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const btn = document.getElementById('submitOrderBtn');
      
      // تجهيز البيانات
      const orderData = {
        customerName: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        address: document.getElementById('custAddress').value,
        cart: cart,
        total: document.getElementById('totalPrice').innerText
      };

      btn.innerText = "جاري إرسال طلبك...";
      btn.disabled = true;

      try {
        // نستخدم المنفذ 5000 كما اتفقنا في تعديل السيرفر الأخير
        const response = await fetch('http://localhost:5000/api/order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        if (response.ok) {
          alert('✅ شكرًا لك! تم إرسال طلبك بنجاح، وسنتواصل معك هاتفياً.');
          localStorage.removeItem('cart'); // مسح السلة بعد النجاح
          window.location.href = 'index.html';
        } else {
          alert('❌ فشل في إرسال الطلب. تأكد أن السيرفر يعمل.');
        }
      } catch (error) {
        console.error(error);
        alert('⚠️ خطأ في الاتصال بالسيرفر! تأكد من تشغيل (node server.js) في الخلفية.');
      } finally {
        btn.innerText = "إتمام الشراء وإرسال الطلب";
        btn.disabled = false;
      }
    });

    // تشغيل العرض فور فتح الصفحة
    window.onload = displayCart;
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
