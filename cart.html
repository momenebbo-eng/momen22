<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>سلة المشتريات | إتمام الطلب</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background-color: #f4f7f6; padding-bottom: 50px; }
    .cart-container { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
    .checkout-form { background: #fff; border-radius: 20px; padding: 25px; border: 1px solid #eee; }
    .product-img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
    .btn-primary { background-color: #25D366; border: none; } /* لون الواتساب */
    .btn-primary:hover { background-color: #128C7E; }
  </style>
</head>
<body>

  <nav class="navbar navbar-dark bg-success mb-5 shadow">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="index.html">🛍️ مـتـجـري</a>
      <a href="index.html" class="btn btn-outline-light rounded-pill px-4">العودة للمتجر</a>
    </div>
  </nav>

  <div class="container">
    <div class="row g-4">
      
      <div class="col-lg-7">
        <div class="cart-container">
          <h4 class="fw-bold mb-4"><i class="bi bi-cart-check-fill text-success"></i> طلباتك</h4>
          <div id="cartItems">
            </div>
          <hr class="my-4">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="fw-bold">الإجمالي:</h5>
            <h3 class="fw-bold text-success"><span id="totalPrice">0</span> $</h3>
          </div>
        </div>
      </div>

      <div class="col-lg-5">
        <div class="checkout-form shadow-sm">
          <h4 class="fw-bold mb-4"><i class="bi bi-person-fill text-success"></i> بيانات الشحن</h4>
          <form id="orderForm">
            <div class="mb-3">
              <label class="form-label fw-bold">الاسم</label>
              <input type="text" id="custName" class="form-control" placeholder="اسمك الثنائي" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">رقم الهاتف</label>
              <input type="tel" id="custPhone" class="form-control" placeholder="رقم الموبايل" required>
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">العنوان</label>
              <textarea id="custAddress" class="form-control" rows="2" placeholder="المحافظة - المنطقة - اسم الشارع" required></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 shadow mt-3">
              <i class="bi bi-whatsapp"></i> إرسال الطلب عبر واتساب
            </button>
          </form>
        </div>
      </div>

    </div>
  </div>

  <script>
    // 1. عرض السلة
    function renderCart() {
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      const container = document.getElementById('cartItems');
      const totalSpan = document.getElementById('totalPrice');
      
      if (cart.length === 0) {
        container.innerHTML = '<p class="text-center py-4">السلة فارغة حالياً</p>';
        totalSpan.innerText = "0";
        return;
      }

      let total = 0;
      let html = '';
      cart.forEach((item, index) => {
        total += item.price;
        html += `
          <div class="d-flex align-items-center mb-3 p-2 border-bottom">
            <img src="${item.img}" class="product-img">
            <div class="ms-3 flex-grow-1">
              <h6 class="mb-0 fw-bold">${item.name}</h6>
              <span class="text-success fw-bold">${item.price} $</span>
            </div>
            <button class="btn btn-sm btn-link text-danger" onclick="deleteItem(${index})"><i class="bi bi-trash"></i></button>
          </div>`;
      });
      container.innerHTML = html;
      totalSpan.innerText = total;
    }

    function deleteItem(index) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      renderCart();
    }

    // 2. إرسال البيانات للواتساب
    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const cart = JSON.parse(localStorage.getItem('cart')) || [];
      if (cart.length === 0) { alert("السلة فارغة!"); return; }

      const name = document.getElementById('custName').value;
      const phone = document.getElementById('custPhone').value;
      const address = document.getElementById('custAddress').value;
      const total = document.getElementById('totalPrice').innerText;

      // رقمك الشخصي (اكتب رقمك هنا بالصيغة الدولية)
      // مثال: 201012345678
      const myNumber = "201206896657"; 

      let message = `*طلب جديد من المتجر*%0A%0A`;
      message += `👤 *الاسم:* ${name}%0A`;
      message += `📞 *الهاتف:* ${phone}%0A`;
      message += `📍 *العنوان:* ${address}%0A`;
      message += `--------------------------%0A`;
      message += `🛒 *المنتجات:*%0A`;
      
      cart.forEach(item => {
        message += `- ${item.name} (${item.price}$)%0A`;
      });
      
      message += `--------------------------%0A`;
      message += `💰 *الإجمالي:* ${total}$`;

      const whatsappUrl = `https://wa.me/${myNumber}?text=${message}`;
      
      // مسح السلة والتحويل لواتساب
      localStorage.removeItem('cart');
      window.open(whatsappUrl, '_blank');
      window.location.href = "index.html";
    });

    window.onload = renderCart;
  </script>
</body>
</html>
