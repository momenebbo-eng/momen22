<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>إنشاء حساب جديد</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap');
    body { font-family: 'Tajawal', sans-serif; background: #f8f9fa; padding-top: 50px; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow border-0 rounded-4 p-5">
        <h3 class="text-center fw-bold mb-4">إنشاء حساب جديد</h3>
        <form id="registerForm">
          <div class="mb-3">
            <label>الاسم الأول</label>
            <input type="text" id="firstName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>اسم العائلة</label>
            <input type="text" id="lastName" class="form-control" required>
          </div>
          <div class="mb-3">
            <label>البريد الإلكتروني</label>
            <input type="email" id="email" class="form-control" required>
          </div>
          <button type="submit" id="submitBtn" class="btn btn-primary w-100 mb-3">تسجيل</button>
          <div class="text-center"><a href="index.html" class="text-muted text-decoration-none">العودة للرئيسية</a></div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  document.getElementById('registerForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.innerText = 'جاري الإرسال...';
      btn.disabled = true;

      const data = {
          firstName: document.getElementById('firstName').value,
          lastName: document.getElementById('lastName').value,
          email: document.getElementById('email').value
      };

      try {
          const res = await fetch('http://localhost:3000/api/register', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify(data)
          });
          
          if(res.ok) {
              localStorage.setItem('currentUser', JSON.stringify({ name: data.firstName, email: data.email }));
              alert('تم التسجيل بنجاح! سيتم تحويلك للرئيسية.');
              window.location.href = 'index.html';
          }
      } catch (err) {
          alert('تأكد من تشغيل الخادم (server.js)');
      } finally {
          btn.innerText = 'تسجيل';
          btn.disabled = false;
      }
  });
</script>
</body>
</html>
