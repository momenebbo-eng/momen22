<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .reg-card { max-width: 400px; margin: 50px auto; padding: 20px; background: #fff; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container">
    <div class="reg-card">
        <h3 class="text-center mb-4">إنشاء حساب جديد</h3>
        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label">الاسم بالكامل</label>
                <input type="text" id="fullName" class="form-control" placeholder="اسمه إيه يا بطل؟" required>
            </div>
            <div class="mb-3">
                <label class="form-label">رابط صورة البروفايل</label>
                <input type="url" id="profilePic" class="form-control" placeholder="حط رابط صورة من جوجل">
            </div>
            <div class="mb-3">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" id="email" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">كلمة السر</label>
                <input type="password" id="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">سجل دلوقتي</button>
        </form>
        <p class="text-center mt-3">عندك حساب؟ <a href="login.html">سجل دخول</a></p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
        authDomain: "mystore-6fd57.firebaseapp.com",
        projectId: "mystore-6fd57",
        storageBucket: "mystore-6fd57.firebasestorage.app",
        messagingSenderId: "1075846308469",
        appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('fullName').value;
        const email = document.getElementById('email').value;
        const pass = document.getElementById('password').value;
        const pic = document.getElementById('profilePic').value || 'https://via.placeholder.com/150';

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
            await updateProfile(userCredential.user, {
                displayName: name,
                photoURL: pic
            });
            alert("مبروك يا مؤمن الحساب اشتغل!");
            window.location.href = "login.html";
        } catch (error) {
            alert("في مشكلة: " + error.message);
        }
    });
</script>
</body>
</html>
