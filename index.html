<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>متجري | وجهتك الأولى للتسوق</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
    :root { --primary-color: #4361ee; --accent-color: #4cc9f0; }
    body { font-family: 'Tajawal', sans-serif; background-color: #f8f9fa; }
    .navbar { background: rgba(67, 97, 238, 0.95) !important; backdrop-filter: blur(10px); padding: 15px 0; }
    .hero-section { background: linear-gradient(45deg, var(--primary-color), var(--accent-color)); color: white; padding: 60px 0; border-radius: 0 0 50px 50px; }
    .product-card { border: none; border-radius: 20px; transition: 0.3s; background: white; overflow: hidden; height: 100%; }
    .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    .card-img-top { height: 200px; object-fit: cover; cursor: pointer; }
    .user-box { display: flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.2); padding: 5px 15px; border-radius: 50px; color: white; text-decoration: none; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html"><i class="bi bi-bag-heart-fill"></i> مـتـجـري</a>
      
      <div class="d-flex align-items-center gap-2">
        <div id="authLinks" class="d-flex gap-2">
          <a href="login.html" class="btn btn-outline-light btn-sm rounded-pill px-3">دخول</a>
          <a href="register.html" class="btn btn-light btn-sm rounded-pill px-3 text-primary fw-bold">حساب جديد</a>
        </div>

        <a href="profile.html" id="userBox" class="user-box hidden">
          <i class="bi bi-person-circle fs-5"></i>
          <span id="userNameDisplay" class="small fw-bold"></span>
        </a>

        <a href="cart.html" class="btn btn-primary rounded-circle p-2 ms-2 position-relative">
          <i class="bi bi-cart3"></i>
          <span id="cartCount" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
        </a>
      </div>
    </div>
  </nav>

  <header class="hero-section text-center">
    <div class="container py-4">
      <h1 class="display-4 fw-bold mb-3">تسوق بذكاء مع مؤمن</h1>
      <p class="lead mb-4 opacity-75">أفضل المنتجات بأسعار تنافسية وتوصيل سريع.</p>
    </div>
  </header>

  <section class="py-5">
    <div class="container">
      <h2 class="fw-bold mb-4 text-primary">⭐ منتجات مختارة</h2>
      <div class="row g-4">
        
        <div class="col-md-4">
          <div class="product-card shadow-sm card">
            <a href="product-details.html?name=ساعة ابل الذكية&price=299&img=https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400">
              <img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400" class="card-img-top" alt="ساعة">
            </a>
            <div class="card-body text-center">
              <h5 class="fw-bold">ساعة ابل الذكية</h5>
              <p class="text-primary fw-bold fs-4">299 $</p>
              <button class="btn btn-primary w-100 rounded-pill" onclick="addToCart('ساعة ابل الذكية', 299, 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=400')">إضافة للسلة</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="product-card shadow-sm card">
            <a href="product-details.html?name=سماعات سوني&price=120&img=https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400">
              <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="card-img-top" alt="سماعات">
            </a>
            <div class="card-body text-center">
              <h5 class="fw-bold">سماعات سوني</h5>
              <p class="text-primary fw-bold fs-4">120 $</p>
              <button class="btn btn-primary w-100 rounded-pill" onclick="addToCart('سماعات سوني', 120, 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400')">إضافة للسلة</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
      authDomain: "mystore-6fd57.firebaseapp.com",
      projectId: "mystore-6fd57",
      storageBucket: "mystore-6fd57.firebasestorage.app",
      messagingSenderId: "1075846308469",
      appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    onAuthStateChanged(auth, (user) => {
      const authLinks = document.getElementById('authLinks');
      const userBox = document.getElementById('userBox');
      const nameDisp = document.getElementById('userNameDisplay');

      if (user) {
        authLinks.classList.add('hidden');
        userBox.classList.remove('hidden');
        nameDisp.innerText = user.displayName || "الملف الشخصي";
      } else {
        authLinks.classList.remove('hidden');
        userBox.classList.add('hidden');
      }
    });
  </script>

  <script>
    function addToCart(name, price, img) {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      cart.push({ name: name, price: price, img: img });
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      alert(`✅ تمت إضافة ${name} للسلة!`);
    }

    function updateCartCount() {
      let cart = JSON.parse(localStorage.getItem('cart')) || [];
      const countEl = document.getElementById('cartCount');
      if(countEl) countEl.innerText = cart.length;
    }

    window.onload = updateCartCount;
  </script>

</body>
</html>
