<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجري - الصفحة الرئيسية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #333 !important; }
        .user-pic { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .product-card { border: none; border-radius: 15px; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .product-img { height: 200px; object-fit: cover; border-radius: 15px 15px 0 0; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛍️ متجري</a>
            
            <div class="d-flex align-items-center">
                <div id="userInfo" class="d-none">
                    <span class="text-white me-2" id="userName">جاري التحميل...</span>
                    <img id="userImg" src="" class="user-pic border border-light">
                    <button class="btn btn-sm btn-outline-danger ms-3" onclick="logout()">خروج</button>
                </div>
                
                <div id="loginLink">
                    <a href="login.html" class="btn btn-outline-light btn-sm">تسجيل دخول</a>
                </div>

                <a href="cart.html" class="btn btn-warning btn-sm ms-3">
                    <i class="bi bi-cart3"></i> السلة
                </a>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="text-center fw-bold mb-4">أحدث المنتجات</h2>
        <div class="row g-4" id="productsGrid">
            <div class="col-md-4">
                <div class="card product-card shadow-sm h-100">
                    <img src="img/product1.jpg" class="product-img" alt="منتج">
                    <div class="card-body text-center">
                        <h5 class="card-title fw-bold">اسم المنتج</h5>
                        <p class="text-success fw-bold fs-5">150 $</p>
                        <button class="btn btn-primary rounded-pill w-100" onclick="addToCart('اسم المنتج', 150, 'img/product1.jpg')">إضافة للسلة</button>
                    </div>
                </div>
            </div>
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAlOn_7ErG74KXYhM25LApsZATjXA3PE-M",
            authDomain: "mystore-6fd57.firebaseapp.com",
            projectId: "mystore-6fd57",
            storageBucket: "mystore-6fd57.firebasestorage.app",
            messagingSenderId: "1075846308469",
            appId: "1:1075846308469:web:3d097e4a3064ab33368e3c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();

        // فحص حالة المستخدم
        onAuthStateChanged(auth, (user) => {
            const userInfo = document.getElementById('userInfo');
            const loginLink = document.getElementById('loginLink');
            const userName = document.getElementById('userName');
            const userImg = document.getElementById('userImg');

            if (user) {
                // المستخدم سجل دخول
                userInfo.classList.remove('d-none');
                loginLink.classList.add('d-none');
                userName.innerText = user.displayName || "مستخدم";
                userImg.src = user.photoURL || "https://via.placeholder.com/150";
            } else {
                // المستخدم غير مسجل
                userInfo.classList.add('d-none');
                loginLink.classList.remove('d-none');
            }
        });

        // دالة تسجيل الخروج
        window.logout = function() {
            signOut(auth).then(() => {
                alert("نشوفك تاني قريباً!");
                window.location.reload();
            });
        }
    </script>

    <script>
        // دالة إضافة للسلة
        function addToCart(name, price, img) {
            let cart = JSON.parse(localStorage.getItem('cart')) || [];
            cart.push({name, price, img});
            localStorage.setItem('cart', JSON.stringify(cart));
            alert("تم إضافة " + name + " للسلة!");
        }
    </script>

</body>
</html>
